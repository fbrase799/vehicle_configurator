spring.application.name=vehicle-configurator

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/configurator}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:configurator}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:configurator123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080

spring.threads.virtual.enabled=true
