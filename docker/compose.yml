services:
  database:
    image: mysql:8.4
    container_name: configurator-db
    env_file:
      - ./env/database.env
    ports:
      - "3306:3306"
    volumes:
      - ../database/init:/docker-entrypoint-initdb.d:ro
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: configurator-backend
    env_file:
      - ./env/backend.env
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: dev
    container_name: configurator-frontend
    env_file:
      - ./env/frontend.env
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # Structurizr Lite - C4 architecture documentation (docs/structurizr/workspace.dsl).
  # Browse at http://localhost:8000/ ; edits to the DSL hot-reload automatically.
  structurizr:
    container_name: configurator-structurizr
    image: structurizr/lite:latest
    ports:
      - "8000:8080"
    volumes:
      - ../docs/structurizr:/usr/local/structurizr
    restart: unless-stopped

volumes:
  db-data:
