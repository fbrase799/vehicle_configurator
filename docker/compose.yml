services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: configurator-backend
    env_file:
      - ./env/backend.env
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: dev
    container_name: configurator-frontend
    env_file:
      - ./env/frontend.env
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # Structurizr Lite - C4 architecture documentation (docs/structurizr/workspace.dsl).
  # Browse at http://localhost:8000/ ; edits to the DSL hot-reload automatically.
  structurizr:
    container_name: configurator-structurizr
    image: structurizr/lite:latest
    ports:
      - "8000:8080"
    volumes:
      - ../docs/structurizr:/usr/local/structurizr
    restart: unless-stopped

volumes:
  backend-data:
