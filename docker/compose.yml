services:
  database:
    image: mysql:8.0
    container_name: configurator-db
    env_file:
      - ./env/database.env
    ports:
      - "3306:3306"
    volumes:
      - ../database/init:/docker-entrypoint-initdb.d:ro
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: configurator-backend
    env_file:
      - ./env/backend.env
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: configurator-frontend
    env_file:
      - ./env/frontend.env
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db-data:
