services:
  database:
    image: mysql:8.4
    container_name: configurator-db
    env_file:
      - ./env/database.env
    ports:
      - "3306:3306"
    volumes:
      - ../database/init:/docker-entrypoint-initdb.d:ro
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/fbrase-itk/vehicle_configurator-backend:${BACKEND_TAG:-latest}
    container_name: configurator-backend
    env_file:
      - ./env/backend.env
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/fbrase-itk/vehicle_configurator-frontend:${FRONTEND_TAG:-latest}
    container_name: configurator-frontend
    env_file:
      - ./env/frontend.env
    # Published image serves the compiled Vue app via nginx on port 80.
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
