services:
  backend:
    image: ghcr.io/fbrase799/vehicle_configurator-backend:${BACKEND_TAG:-latest}
    container_name: configurator-backend
    env_file:
      - ./env/backend.env
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/fbrase799/vehicle_configurator-frontend:${FRONTEND_TAG:-latest}
    container_name: configurator-frontend
    env_file:
      - ./env/frontend.env
    # Published image serves the compiled Vue app via nginx on port 80.
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
