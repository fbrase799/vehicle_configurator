name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 25, Spring Boot 4.0.5)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Show toolchain versions
        run: |
          java -version
          mvn -v

      - name: Build, test, and package
        run: mvn -B -ntp verify

      - name: Upload jar artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: backend/target/*.jar
          if-no-files-found: error
          retention-days: 7

  frontend:
    name: Frontend (Node 22, Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  integration:
    name: Integration smoke test (Docker Compose)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend + database via Compose
        run: docker compose -f docker/compose.yml build backend

      - name: Start database + backend
        run: docker compose -f docker/compose.yml up -d database backend

      - name: Wait for backend to become ready
        run: |
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/options || true)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "backend ready"
              exit 0
            fi
            sleep 3
          done
          echo "backend did not become ready"
          docker compose -f docker/compose.yml logs backend
          exit 1

      - name: Smoke test all REST endpoints
        run: |
          set -euo pipefail
          for ep in options car-models engines paints wheel-designs wheel-colors caliper-colors equipment; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/api/$ep")
            echo "GET /api/$ep => $code"
            [ "$code" = "200" ] || { echo "endpoint /api/$ep failed"; exit 1; }
          done
          resp=$(curl -s -X POST http://localhost:8080/api/configurations \
            -H "Content-Type: application/json" \
            -d '{"carModelId":1,"engineId":1,"paintId":1,"wheelDesignId":1,"wheelColorId":1,"caliperColorId":1,"equipmentIds":[1,2]}')
          echo "POST /api/configurations => $resp" | head -c 400
          cfg=$(echo "$resp" | grep -oE '"id":"[a-f0-9-]+"' | head -1 | cut -d'"' -f4)
          [ -n "$cfg" ] || { echo "no configuration id returned"; exit 1; }
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/api/configurations/$cfg")
          echo "GET /api/configurations/$cfg => $code"
          [ "$code" = "200" ] || exit 1
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8080/api/orders \
            -H "Content-Type: application/json" \
            -d "{\"configurationId\":\"$cfg\",\"customerName\":\"CI Bot\",\"customerEmail\":\"ci@example.com\"}")
          echo "POST /api/orders => $code"
          [ "$code" = "200" ] || exit 1

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker/compose.yml logs backend || true
          docker compose -f docker/compose.yml logs database || true

      - name: Tear down stack
        if: always()
        run: docker compose -f docker/compose.yml down -v
