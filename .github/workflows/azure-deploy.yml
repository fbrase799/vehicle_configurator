name: Deploy to Azure

# Runs after "Publish Docker images" finishes successfully on main, so
# the images we roll forward to are the ones this commit just built.
# Also manually triggerable to force a redeploy of the current :latest.
on:
  workflow_run:
    workflows: ["Publish Docker images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC federation
  contents: read

jobs:
  deploy:
    name: az containerapp update (backend + frontend + database)
    runs-on: ubuntu-latest
    # Don't deploy if the upstream publish workflow failed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure containerapp extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Roll forward images
        run: bash azure/02-update-images.sh

      - name: Print public URL
        run: |
          FQDN=$(az containerapp show \
            --name frontend \
            --resource-group rg-vehicle-configurator \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "::notice title=Deployed::https://$FQDN"
